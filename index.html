<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mo's 12-Week Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--blk:#0a0a0a;--crd:#1a1a1a;--bdr:#2a2a2a;--acc:#e8ff47;--or:#ff6b35;--mut:#555;--txt:#e8e8e8;--dim:#888;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--blk);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh;}
header{padding:36px 24px 24px;border-bottom:1px solid var(--bdr);}
.hl{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--acc);margin-bottom:6px;}
.ht{font-family:'Bebas Neue',sans-serif;font-size:68px;line-height:.9;}
.ht span{color:var(--acc);}
.hs{margin-top:10px;font-size:13px;color:var(--dim);line-height:1.6;}
.pbar{display:flex;gap:8px;padding:16px 24px;overflow-x:auto;border-bottom:1px solid var(--bdr);}
.pp{flex-shrink:0;padding:7px 16px;border-radius:999px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bdr);background:transparent;color:var(--dim);white-space:nowrap;font-family:'DM Sans',sans-serif;}
.pp.on{background:var(--acc);color:var(--blk);border-color:var(--acc);}
.wnav{display:flex;align-items:center;gap:12px;padding:18px 24px 0;}
.wlbl{font-family:'Bebas Neue',sans-serif;font-size:28px;flex:1;}
.wlbl span{color:var(--acc);}
.nb{width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:transparent;color:var(--txt);cursor:pointer;font-size:20px;line-height:1;font-family:'DM Sans',sans-serif;}
.nb:disabled{opacity:.2;}
.bdg{display:inline-block;padding:4px 12px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin:10px 24px 14px;}
.bpf{background:rgba(232,255,71,.12);color:var(--acc);border:1px solid rgba(232,255,71,.25);}
.bpb{background:rgba(255,107,53,.12);color:var(--or);border:1px solid rgba(255,107,53,.25);}
.bpp{background:rgba(180,100,255,.12);color:#c47aff;border:1px solid rgba(180,100,255,.25);}
.tbox{margin:0 24px 14px;padding:12px 16px;border:1px solid var(--bdr);border-radius:12px;background:rgba(255,107,53,.05);}
.ttl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--or);margin-bottom:4px;}
.tnote{font-size:12px;color:var(--dim);line-height:1.5;}
.prwrap{padding:0 24px 14px;}
.prt{height:3px;background:var(--bdr);border-radius:999px;overflow:hidden;}
.prf{height:100%;background:var(--acc);border-radius:999px;}
.prl{display:flex;justify-content:space-between;margin-top:5px;font-size:10px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;}
.wdots{display:flex;gap:5px;padding:0 24px 14px;flex-wrap:wrap;}
.wd{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--bdr);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mut);background:transparent;font-family:'DM Sans',sans-serif;}
.wd.cur{border-color:var(--acc);color:var(--acc);}
.wd.dk{background:rgba(232,255,71,.15);border-color:rgba(232,255,71,.4);color:var(--acc);}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:0 24px 18px;}
.sb{background:var(--crd);border:1px solid var(--bdr);border-radius:10px;padding:12px;text-align:center;}
.sv{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--acc);line-height:1;}
.sl{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.days{padding:0 16px 40px;}
.dc{background:var(--crd);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;margin-bottom:10px;}
.dc.dd{border-color:rgba(232,255,71,.3);}
.dh{display:flex;align-items:center;gap:12px;padding:16px 18px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.dnum{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--mut);min-width:32px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ds{background:var(--acc);}
.dr{background:#47d4ff;}
.du{background:var(--or);}
.dc2{background:#ff4747;}
.dh2{background:#c47aff;}
.dre{background:var(--mut);}
.di{flex:1;}
.dn{font-weight:600;font-size:14px;}
.dt{font-size:11px;color:var(--dim);margin-top:2px;}
.das{display:flex;align-items:center;gap:8px;}
.cb{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--bdr);background:transparent;cursor:pointer;font-size:13px;color:transparent;font-family:'DM Sans',sans-serif;}
.dc.dd .cb{background:var(--acc);border-color:var(--acc);color:var(--blk);}
.chv{font-size:11px;color:var(--mut);display:inline-block;}
.db{display:none;padding:0 18px 16px;border-top:1px solid var(--bdr);}
.stl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin:12px 0 6px;}
.er{display:flex;align-items:center;gap:10px;padding:9px 10px;background:rgba(255,255,255,.03);border-radius:8px;margin-bottom:5px;}
.ec{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--bdr);background:transparent;cursor:pointer;font-size:10px;color:transparent;flex-shrink:0;font-family:'DM Sans',sans-serif;}
.ec.xd{background:var(--acc);border-color:var(--acc);color:var(--blk);}
.ei{flex:1;}
.en{font-size:13px;font-weight:500;}
.ed{font-size:11px;color:var(--dim);margin-top:1px;}
.es{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--acc);}
.wi{width:52px;background:rgba(255,255,255,.06);border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:12px;text-align:center;padding:5px 3px;outline:none;flex-shrink:0;}
.wi:focus{border-color:var(--acc);}
.cnote{margin-top:12px;padding:10px 12px;background:rgba(232,255,71,.04);border:1px solid rgba(232,255,71,.12);border-radius:8px;font-size:12px;color:var(--dim);line-height:1.6;}
.cnote b{color:var(--acc);font-size:10px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:3px;}
.resetbtn{margin-top:12px;background:transparent;color:var(--dim);border:1px solid var(--bdr);border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.resetbtn:hover{border-color:var(--acc);color:var(--txt);}
</style>
</head>
<body>

<header>
  <div class="hl">12-Week Hybrid Programme</div>
  <div class="ht">MO'S<br><span>PLAN</span></div>
  <div class="hs">Strength + cardio endurance &middot; 6 days on &middot; Sunday rest</div>
<button class="resetbtn" type="button" onclick="resetProgress()">Reset progress</button></header>

<div class="pbar">
  <button class="pp on" onclick="gotoPhase(1,0)">All Phases</button>
  <button class="pp" onclick="gotoPhase(1,1)">Phase 1 Foundation</button>
  <button class="pp" onclick="gotoPhase(5,2)">Phase 2 Build</button>
  <button class="pp" onclick="gotoPhase(9,3)">Phase 3 Peak</button>
</div>

<div class="wnav">
  <button class="nb" id="prevBtn" onclick="changeWeek(-1)">&#8249;</button>
  <div class="wlbl">Week <span id="wNum">1</span></div>
  <button class="nb" id="nextBtn" onclick="changeWeek(1)">&#8250;</button>
</div>

<div id="badge" class="bdg bpf">Phase 1 Foundation</div>

<div class="tbox">
  <div class="ttl">This Week</div>
  <div class="tnote" id="tnote">Establish baselines. Technique first.</div>
</div>

<div class="prwrap">
  <div class="prt"><div class="prf" id="prf" style="width:8.33%"></div></div>
  <div class="prl"><span>W1</span><span id="prlbl">Week 1 of 12</span><span>W12</span></div>
</div>

<div class="wdots" id="wdots"></div>

<div class="stats">
  <div class="sb"><div class="sv" id="sd">0</div><div class="sl">Days Done</div></div>
  <div class="sb"><div class="sv" id="se">0</div><div class="sl">Exercises</div></div>
  <div class="sb"><div class="sv" id="sw">0</div><div class="sl">Weeks Done</div></div>
</div>

<div class="days" id="grid"></div>

<script>
var W = 1;
var openCards = {};
var dayDone = {};
var exDone = {};
var wtVals = {};
var STORE_KEY = 'mo12weekplan:v2';

function persist() {
  try {
    var state = {
      W: W,
      dayDone: dayDone,
      exDone: exDone,
      wtVals: wtVals
    };
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
  } catch (err) {
    console.warn('Unable to save progress.', err);
  }
}

function hydrate() {
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if (!raw) return;
    var state = JSON.parse(raw);
    if (state && typeof state === 'object') {
      if (typeof state.W === 'number' && state.W >= 1 && state.W <= 12) W = state.W;
      if (state.dayDone && typeof state.dayDone === 'object') dayDone = state.dayDone;
      if (state.exDone && typeof state.exDone === 'object') exDone = state.exDone;
      if (state.wtVals && typeof state.wtVals === 'object') wtVals = state.wtVals;
    }
  } catch (err) {
    console.warn('Unable to load saved progress.', err);
  }
}

function resetProgress() {
  try { localStorage.removeItem(STORE_KEY); } catch (err) {}
  W = 1;
  openCards = {};
  dayDone = {};
  exDone = {};
  wtVals = {};
  render();
}

var NOTES = [
  "Establish baselines. Technique first.",
  "Push the weights. Add load every session.",
  "Intensify. Heavier, fewer reps. Run volume peaks."
];

var DAYS = [
  {
    day:1, lbl:"Mon", dot:"ds",
    name:"Full Body - Strength A",
    tag:"Compound focus, lower dominant",
    note:"Focus on bar speed on the main lifts. Do 2 ramp-up sets before your working weight.",
    secs:[
      {t:"Main Lifts", wt:1, ex:[
        {n:"Back Squat",s:"4",r:"5 reps"},
        {n:"Romanian Deadlift",s:"3",r:"8 reps - controlled eccentric"},
        {n:"Bench Press",s:"4",r:"5 reps"},
        {n:"Weighted Pull-ups",s:"3",r:"6 reps overhand"}
      ]},
      {t:"Accessory", wt:0, ex:[
        {n:"Dumbbell Lunges",s:"3",r:"10 each leg"},
        {n:"Incline DB Press",s:"3",r:"10 reps upper chest"},
        {n:"Face Pulls",s:"3",r:"15 reps shoulder health"},
        {n:"Plank Hold",s:"3",r:"45 sec core bracing"}
      ]}
    ]
  },
  {
    day:2, lbl:"Tue", dot:"dr",
    name:"Zone 2 Run",
    tag:"Aerobic base, easy effort",
    note:"Conversational pace the whole way. If you cannot hold a sentence, slow down.",
    secs:[
      {t:"Session", wt:0, ex:[
        {n:"Easy Run W1-4",s:"1",r:"30 min at 65-70 percent max HR"},
        {n:"Easy Run W5-8",s:"1",r:"40 min build aerobic base"},
        {n:"Easy Run W9-12",s:"1",r:"45 plus min include hills"},
        {n:"Post-run stretch",s:"1",r:"5-10 min hips calves hamstrings"}
      ]}
    ]
  },
  {
    day:3, lbl:"Wed", dot:"ds",
    name:"Full Body - Strength B",
    tag:"Compound focus, upper dominant",
    note:"Deadlift is the anchor of this day. Everything else supports it. Avoid failure on accessories.",
    secs:[
      {t:"Main Lifts", wt:1, ex:[
        {n:"Deadlift",s:"4",r:"4 reps"},
        {n:"Overhead Press",s:"4",r:"5 reps"},
        {n:"Front Squat",s:"3",r:"5 reps technique and quad strength"},
        {n:"Weighted Chin-ups",s:"3",r:"6 reps underhand"}
      ]},
      {t:"Accessory", wt:0, ex:[
        {n:"Cable Rows",s:"3",r:"10 reps squeeze at peak"},
        {n:"Weighted Dips",s:"3",r:"8 reps full ROM"},
        {n:"Leg Curl",s:"3",r:"12 reps hamstring isolation"},
        {n:"Ab Wheel Rollout",s:"3",r:"10 reps slow and controlled"}
      ]}
    ]
  },
  {
    day:4, lbl:"Thu", dot:"du",
    name:"Upper Body - Hypertrophy",
    tag:"Volume push and pull, muscle building",
    note:"Higher rep ranges. Chase a pump. This is your volume day. Rest 60-75 sec between sets.",
    secs:[
      {t:"Push", wt:0, ex:[
        {n:"DB Shoulder Press",s:"4",r:"10 reps controlled tempo"},
        {n:"Cable Chest Fly",s:"3",r:"12 reps full stretch at bottom"},
        {n:"Lateral Raises",s:"4",r:"15 reps slight bend in elbow"},
        {n:"Tricep Pushdown",s:"3",r:"12 reps cable or band"}
      ]},
      {t:"Pull", wt:0, ex:[
        {n:"Seated Cable Row",s:"4",r:"10 reps elbows to ribs"},
        {n:"Lat Pulldown",s:"3",r:"12 reps shoulder-width grip"},
        {n:"DB Bicep Curls",s:"3",r:"12 reps supinate at top"},
        {n:"Rear Delt Fly",s:"3",r:"15 reps light squeeze hard"}
      ]}
    ]
  },
  {
    day:5, lbl:"Fri", dot:"dc2",
    name:"Conditioning - Circuits",
    tag:"Metabolic work, cardio endurance",
    note:"Engine room day. Push hard on circuit rounds. Rest 90 sec between rounds. W1-4: 3 rounds. W5-8: 4 rounds. W9-12: 4 rounds at 60 sec rest.",
    secs:[
      {t:"Warm-up", wt:0, ex:[
        {n:"Row or Ski Erg",s:"1",r:"5 min easy build-up"},
        {n:"Jump Rope",s:"3",r:"1 min with 30 sec rest"}
      ]},
      {t:"Circuit", wt:0, ex:[
        {n:"Sled Push or Pull",s:"4",r:"20m explosive max effort"},
        {n:"Burpees",s:"1",r:"10 reps into next exercise"},
        {n:"Air Bike",s:"1",r:"30 sec all-out sprint"},
        {n:"KB Swings",s:"1",r:"15 reps hip hinge power"}
      ]},
      {t:"Cool-down", wt:0, ex:[
        {n:"Assault Bike or Row",s:"1",r:"10 min zone 2 pace"}
      ]}
    ]
  },
  {
    day:6, lbl:"Sat", dot:"dh2",
    name:"Lower Body - Hypertrophy",
    tag:"Volume legs, squat and hinge",
    note:"Leave your ego at the door. Legs are already fatigued. Quality over load.",
    secs:[
      {t:"Primary", wt:0, ex:[
        {n:"Hack Squat or Leg Press",s:"4",r:"10-12 reps high volume quad work"},
        {n:"Romanian Deadlift",s:"4",r:"10 reps hip hinge stretch hamstrings"},
        {n:"Bulgarian Split Squat",s:"3",r:"10 each rear foot elevated"},
        {n:"Leg Curl Seated",s:"3",r:"12 reps full ROM"}
      ]},
      {t:"Finisher", wt:0, ex:[
        {n:"Leg Extension",s:"3",r:"15 reps squeeze quads"},
        {n:"Calf Raises",s:"4",r:"15 reps 3 sec slow eccentric"},
        {n:"Glute Bridge",s:"3",r:"12 reps barbell loaded"}
      ]}
    ]
  },
  {
    day:7, lbl:"Sun", dot:"dre",
    name:"Rest Day",
    tag:"Recovery and mobility",
    note:"Full rest. Eat well, sleep 8 hours. This day makes the other six work.",
    rest:1,
    secs:[
      {t:"Optional", wt:0, ex:[
        {n:"Easy walk",s:"-",r:"20-30 min gentle movement"},
        {n:"Foam roll",s:"-",r:"10 min quads lats IT band"}
      ]}
    ]
  }
];

function phase(w){ return w<=4 ? 0 : w<=8 ? 1 : 2; }

function updateHeader() {
  var p = phase(W);
  var names = ["Foundation","Build","Peak"];
  var bcls = ["bpf","bpb","bpp"];
  document.getElementById("wNum").textContent = W;
  document.getElementById("prevBtn").disabled = (W===1);
  document.getElementById("nextBtn").disabled = (W===12);
  document.getElementById("prf").style.width = ((W/12)*100)+"%";
  document.getElementById("prlbl").textContent = "Week "+W+" of 12";
  document.getElementById("tnote").textContent = NOTES[p];
  var bdg = document.getElementById("badge");
  bdg.className = "bdg "+bcls[p];
  bdg.textContent = "Phase "+(p+1)+" "+names[p];
}

function updateDots() {
  var el = document.getElementById("wdots");
  el.innerHTML = "";
  for(var i=1;i<=12;i++){
    var allD = true;
    for(var j=1;j<=6;j++){ if(!dayDone["w"+i+"d"+j]){ allD=false; break; } }
    var btn = document.createElement("button");
    btn.className = "wd" + (i===W?" cur":"") + (allD?" dk":"");
    btn.textContent = i;
    btn.setAttribute("data-w", i);
    btn.onclick = dotClick;
    el.appendChild(btn);
  }
}

function dotClick() {
  W = parseInt(this.getAttribute("data-w"), 10);
  openCards = {};
  persist();
  render();
}

function updateStats() {
  var td=0, te=0, tw=0;
  for(var i=1;i<=12;i++){
    var wd=0;
    for(var j=1;j<=6;j++){ if(dayDone["w"+i+"d"+j]){ td++; wd++; } }
    if(wd===6) tw++;
  }
  var eks = Object.keys(exDone);
  for(var i=0;i<eks.length;i++){ if(exDone[eks[i]]) te++; }
  document.getElementById("sd").textContent = td;
  document.getElementById("se").textContent = te;
  document.getElementById("sw").textContent = tw;
}

function buildGrid() {
  var grid = document.getElementById("grid");
  grid.innerHTML = "";
  for(var di=0; di<DAYS.length; di++){
    var day = DAYS[di];
    var dk = "w"+W+"d"+day.day;
    var isDone = !!dayDone[dk];
    var isOpen = !!openCards[dk];

    var card = document.createElement("div");
    card.className = "dc" + (isDone?" dd":"");

    var dhead = document.createElement("div");
    dhead.className = "dh";
    dhead.setAttribute("data-dk", dk);
    dhead.innerHTML = '<div class="dnum">'+day.lbl+'</div>'
      +'<div class="dot '+day.dot+'"></div>'
      +'<div class="di"><div class="dn">'+day.name+'</div><div class="dt">'+day.tag+'</div></div>'
      +'<div class="das">'
      +(day.rest ? '' : '<button class="cb" data-dk="'+dk+'" onclick="toggleDay(\''+dk+'\')">&#10003;</button>')
      +'<span class="chv">'+(isOpen?'&#9650;':'&#9662;')+'</span>'
      +'</div>';
    dhead.onclick = function(e) {
      if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT') return;
      var k = this.getAttribute("data-dk");
      openCards[k] = !openCards[k];
      render();
    };
    card.appendChild(dhead);

    if(isOpen){
      var dbody = document.createElement("div");
      dbody.className = "db";
      dbody.style.display = "block";
      var bodyHTML = "";
      for(var si=0;si<day.secs.length;si++){
        var sec = day.secs[si];
        bodyHTML += '<div class="stl">'+sec.t+'</div>';
        for(var xi=0;xi<sec.ex.length;xi++){
          var ex = sec.ex[xi];
          var ek = dk+"s"+si+"e"+xi;
          var xd = !!exDone[ek];
          var wk = ek+"w";
          var wval = wtVals[wk]||"";
          bodyHTML += '<div class="er">'
            +'<button class="ec'+(xd?" xd":"")
            +'" onclick="toggleEx(\''+ek+'\')">&#10003;</button>'
            +'<div class="ei"><div class="en">'+ex.n+'</div><div class="ed">'+ex.r+'</div></div>'
            +(sec.wt?'<input class="wi" type="text" inputmode="decimal" placeholder="kg" value="'+wval+'" oninput="saveWt(\''+wk+'\',this.value)" onclick="event.stopPropagation()" />':'')
            +'<div class="es">'+ex.s+'&times;</div>'
            +'</div>';
        }
      }
      bodyHTML += '<div class="cnote"><b>Coach note</b>'+day.note+'</div>';
      dbody.innerHTML = bodyHTML;
      card.appendChild(dbody);
    }

    grid.appendChild(card);
  }
}

function render(){
  updateHeader();
  updateDots();
  updateStats();
  buildGrid();
}

function changeWeek(d){
  W=Math.max(1,Math.min(12,W+d));
  openCards={};
  persist();
  render();
}

function gotoPhase(w,idx){
  var pills = document.querySelectorAll(".pp");
  for(var i=0;i<pills.length;i++){ pills[i].className="pp"; }
  pills[idx].className="pp on";
  W=w;
  openCards={};
  persist();
  render();
}

function toggleDay(dk){
  dayDone[dk]=!dayDone[dk];
  persist();
  render();
}

function toggleEx(ek){
  exDone[ek]=!exDone[ek];
  persist();
  render();
}

function saveWt(wk,val){
  wtVals[wk]=val;
  persist();
}

hydrate();
render();
</script>
</body>
</html>
